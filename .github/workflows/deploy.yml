name: Deploy Typst

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
        with:
          typst-version: latest

      - name: Build all pages
        run: |
          mkdir -p dist/projects          
          typst compile --root . index.typ dist/index.html --features html
          typst compile --root . projects/index.typ dist/projects/index.html --features html
          typst compile --root . resume.typ dist/resume.pdf
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - id: deployment
        uses: actions/deploy-pages@v4
